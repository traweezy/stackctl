version: 2

project_name: stackctl

release:
  github:
    owner: traweezy
    name: stackctl

before:
  hooks:
    - bash scripts/generate-cli-assets.sh
    - go mod tidy

builds:
  - id: stackctl
    main: .
    binary: stackctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - >-
        -s -w
        -X main.version={{ .Version }}
        -X main.gitCommit={{ .Commit }}
        -X main.buildDate={{ .Date }}

archives:
  - id: release-archive
    ids:
      - stackctl
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ title .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - SECURITY.md
      - docs/**/*

checksum:
  name_template: checksums.txt

sboms:
  - id: archive-sboms
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"
    disable: false

signs:
  - id: checksum-sigstore
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

changelog:
  use: github-native

homebrew_casks:
  - name: stackctl
    ids:
      - release-archive
    binaries:
      - stackctl
    manpages:
      - docs/man/man1/stackctl.1
    generate_completions_from_executable:
      executable: bin/stackctl
      args:
        - completion
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
    homepage: https://github.com/traweezy/stackctl
    description: Terminal-first Podman stack operator for local development
    caveats: |
      stackctl installs only the CLI.

      On macOS, install and start Podman before first use:
        brew install podman
        podman machine init
        podman machine start

      Then run:
        stackctl setup
    commit_msg_template: Brew cask update for {{ .ProjectName }} version {{ .Tag }}
    skip_upload: true
