services:
  postgres:
    image: postgres:16
    container_name: {{ printf "%q" .Services.PostgresContainer }}
    restart: unless-stopped
    environment:
      POSTGRES_USER: {{ printf "%q" .Connection.PostgresUsername }}
      POSTGRES_PASSWORD: {{ printf "%q" .Connection.PostgresPassword }}
      POSTGRES_DB: {{ printf "%q" .Connection.PostgresDatabase }}
    ports:
      - "{{ .Ports.Postgres }}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: {{ printf "%q" .Services.RedisContainer }}
    restart: unless-stopped
    ports:
      - "{{ .Ports.Redis }}:6379"
    volumes:
      - redis_data:/data

{{- if .Setup.IncludePgAdmin }}
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: {{ printf "%q" .Services.PgAdminContainer }}
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "{{ .Ports.PgAdmin }}:80"
    depends_on:
      - postgres
{{- end }}

volumes:
  postgres_data:
  redis_data:
