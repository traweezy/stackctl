name: {{ printf "%q" .Stack.Name }}

services:
{{- if .Setup.IncludePostgres }}
  postgres:
    image: {{ printf "%q" .Services.Postgres.Image }}
    container_name: {{ printf "%q" .Services.PostgresContainer }}
    restart: unless-stopped
    environment:
      POSTGRES_USER: {{ printf "%q" .Connection.PostgresUsername }}
      POSTGRES_PASSWORD: {{ printf "%q" .Connection.PostgresPassword }}
      POSTGRES_DB: {{ printf "%q" .Connection.PostgresDatabase }}
    ports:
      - "{{ .Ports.Postgres }}:5432"
    volumes:
      - {{ .Services.Postgres.DataVolume }}:/var/lib/postgresql/data
{{- end }}

{{- if .Setup.IncludeRedis }}
  redis:
    image: {{ printf "%q" .Services.Redis.Image }}
    container_name: {{ printf "%q" .Services.RedisContainer }}
    restart: unless-stopped
    command:
      - redis-server
{{- if .Connection.RedisPassword }}
      - --requirepass
      - {{ printf "%q" .Connection.RedisPassword }}
{{- end }}
      - --appendonly
{{- if .Services.Redis.AppendOnly }}
      - "yes"
{{- else }}
      - "no"
{{- end }}
      - --save
      - {{ printf "%q" .Services.Redis.SavePolicy }}
      - --maxmemory-policy
      - {{ printf "%q" .Services.Redis.MaxMemoryPolicy }}
    ports:
      - "{{ .Ports.Redis }}:6379"
    volumes:
      - {{ .Services.Redis.DataVolume }}:/data
{{- end }}

{{- if .Setup.IncludeNATS }}
  nats:
    image: {{ printf "%q" .Services.NATS.Image }}
    container_name: {{ printf "%q" .Services.NATSContainer }}
    restart: unless-stopped
    command:
      - --config
      - /etc/nats/nats.conf
    ports:
      - "{{ .Ports.NATS }}:4222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
{{- end }}

{{- if .Setup.IncludePgAdmin }}
  pgadmin:
    image: {{ printf "%q" .Services.PgAdmin.Image }}
    container_name: {{ printf "%q" .Services.PgAdminContainer }}
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: {{ printf "%q" .Connection.PgAdminEmail }}
      PGADMIN_DEFAULT_PASSWORD: {{ printf "%q" .Connection.PgAdminPassword }}
{{- if .Services.PgAdmin.ServerMode }}
      PGADMIN_CONFIG_SERVER_MODE: "True"
{{- else }}
      PGADMIN_CONFIG_SERVER_MODE: "False"
{{- end }}
    ports:
      - "{{ .Ports.PgAdmin }}:80"
    volumes:
      - {{ .Services.PgAdmin.DataVolume }}:/var/lib/pgadmin
{{- if .Setup.IncludePostgres }}
    depends_on:
      - postgres
{{- end }}
{{- end }}

volumes:
{{- if .Setup.IncludePostgres }}
  {{ .Services.Postgres.DataVolume }}:
{{- end }}
{{- if .Setup.IncludeRedis }}
  {{ .Services.Redis.DataVolume }}:
{{- end }}
{{- if .Setup.IncludePgAdmin }}
  {{ .Services.PgAdmin.DataVolume }}:
{{- end }}
