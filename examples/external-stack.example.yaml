# Example external-stack config.
# Adjust stack.dir, container names, ports, and enabled services to match your
# own compose project before using it.

stack:
  name: dev-stack
  dir: /home/user/dev/my-compose-stack
  compose_file: compose.yaml
  managed: false

services:
  postgres_container: my-postgres
  redis_container: my-redis
  nats_container: my-nats
  seaweedfs_container: my-seaweedfs
  meilisearch_container: my-meilisearch
  pgadmin_container: my-pgadmin
  postgres:
    image: docker.io/library/postgres:16
    data_volume: postgres_data
    maintenance_database: postgres
  redis:
    image: docker.io/library/redis:7
    data_volume: redis_data
    appendonly: false
    save_policy: 3600 1 300 100 60 10000
    maxmemory_policy: noeviction
  nats:
    image: docker.io/library/nats:2.12.5
  seaweedfs:
    image: docker.io/chrislusf/seaweedfs:4.17@sha256:186de7ef977a20343ee9a5544073f081976a29e2d29ecf8379891e7bf177fbe9
    data_volume: seaweedfs_data
    volume_size_limit_mb: 1024
  meilisearch:
    image: docker.io/getmeili/meilisearch:v1.40.0
    data_volume: meilisearch_data
  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    data_volume: pgadmin_data
    server_mode: false

connection:
  host: localhost
  postgres_database: app
  postgres_username: app
  postgres_password: app
  redis_password: ""
  nats_token: stackctl
  seaweedfs_access_key: stackctl
  seaweedfs_secret_key: stackctlsecret
  meilisearch_master_key: stackctl-meili-master-key
  pgadmin_email: admin@example.com
  pgadmin_password: admin

ports:
  postgres: 5432
  redis: 6379
  nats: 4222
  seaweedfs: 8333
  meilisearch: 7700
  pgadmin: 8081
  cockpit: 9090

urls:
  seaweedfs: http://localhost:8333
  meilisearch: http://localhost:7700
  cockpit: https://localhost:9090
  pgadmin: http://localhost:8081

behavior:
  wait_for_services_on_start: true
  startup_timeout_seconds: 30

setup:
  include_postgres: true
  include_redis: true
  include_cockpit: true
  install_cockpit: false
  include_nats: true
  include_seaweedfs: false
  include_meilisearch: false
  include_pgadmin: true
  scaffold_default_stack: false

tui:
  auto_refresh_interval_seconds: 30

system:
  package_manager: apt
