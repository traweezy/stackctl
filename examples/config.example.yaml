stack:
  name: dev-stack
  dir: /home/user/.local/share/stackctl/stacks/dev-stack
  compose_file: compose.yaml
  managed: true

services:
  postgres_container: local-postgres
  redis_container: local-redis
  nats_container: local-nats
  pgadmin_container: local-pgadmin
  postgres:
    image: docker.io/library/postgres:16
    data_volume: postgres_data
    maintenance_database: postgres
  redis:
    image: docker.io/library/redis:7
    data_volume: redis_data
    appendonly: false
    save_policy: 3600 1 300 100 60 10000
    maxmemory_policy: noeviction
  nats:
    image: docker.io/library/nats:2.12.5
  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    data_volume: pgadmin_data
    server_mode: false

connection:
  host: localhost
  postgres_database: app
  postgres_username: app
  postgres_password: app
  redis_password: ""
  nats_token: stackctl
  pgadmin_email: admin@example.com
  pgadmin_password: admin

ports:
  postgres: 5432
  redis: 6379
  nats: 4222
  pgadmin: 8081
  cockpit: 9090

urls:
  cockpit: https://localhost:9090
  pgadmin: http://localhost:8081

behavior:
  wait_for_services_on_start: true
  startup_timeout_seconds: 30

setup:
  include_postgres: true
  include_redis: true
  include_cockpit: true
  install_cockpit: true
  include_nats: true
  include_pgadmin: true
  scaffold_default_stack: true

system:
  package_manager: apt
