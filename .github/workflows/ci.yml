name: ci

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONLINT_VERSION: v1.7.11
  GOSEC_VERSION: v2.25.0
  GOVULNCHECK_VERSION: v1.1.4
  GITLEAKS_VERSION: v8.30.1
  GOLANGCI_LINT_VERSION: v2.11.4
  GOTESTSUM_VERSION: v1.13.0
  GORELEASER_VERSION: v2.15.2
  LYCHEE_VERSION: lychee-v0.23.0
  SHELLCHECK_VERSION: v0.11.0
  SYFT_VERSION: v1.42.3
  COSIGN_VERSION: v3.0.5
  COVERAGE_THRESHOLD: "100.0"

jobs:
  gosec:
    name: Security / gosec
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gosec
        run: |
          go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"
          tool_bin="$(go env GOBIN)"
          if [ -z "$tool_bin" ]; then
            tool_bin="$(go env GOPATH | awk -F: '{print $1}')/bin"
          fi
          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Run gosec
        run: gosec ./...

  govulncheck:
    name: Security / govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: |
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          tool_bin="$(go env GOBIN)"
          if [ -z "$tool_bin" ]; then
            tool_bin="$(go env GOPATH | awk -F: '{print $1}')/bin"
          fi
          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Run govulncheck
        run: govulncheck ./...

  gitleaks:
    name: Security / gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gitleaks
        run: |
          go install "github.com/zricethezav/gitleaks/v8@${GITLEAKS_VERSION}"
          tool_bin="$(go env GOBIN)"
          if [ -z "$tool_bin" ]; then
            tool_bin="$(go env GOPATH | awk -F: '{print $1}')/bin"
          fi
          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Run gitleaks
        run: gitleaks git --no-banner --redact .

  workflow-lint:
    name: Quality / actionlint
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install actionlint
        run: |
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          tool_bin="$(go env GOBIN)"
          if [ -z "$tool_bin" ]; then
            tool_bin="$(go env GOPATH | awk -F: '{print $1}')/bin"
          fi
          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Install shellcheck
        shell: bash
        run: |
          shellcheck_root="${RUNNER_TEMP}/shellcheck"
          shellcheck_archive="${shellcheck_root}/shellcheck.tar.xz"
          mkdir -p "$shellcheck_root"
          curl --fail --show-error --silent --location \
            --retry 5 --retry-delay 2 --retry-all-errors \
            --output "$shellcheck_archive" \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          tar -xJf "$shellcheck_archive" -C "$shellcheck_root"
          echo "$shellcheck_root/shellcheck-${SHELLCHECK_VERSION}" >> "$GITHUB_PATH"

      - name: Run actionlint
        shell: bash
        run: bash scripts/check-workflows.sh

  shell-lint:
    name: Quality / shellcheck
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install shellcheck
        shell: bash
        run: |
          shellcheck_root="${RUNNER_TEMP}/shellcheck"
          shellcheck_archive="${shellcheck_root}/shellcheck.tar.xz"
          mkdir -p "$shellcheck_root"
          curl --fail --show-error --silent --location \
            --retry 5 --retry-delay 2 --retry-all-errors \
            --output "$shellcheck_archive" \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          tar -xJf "$shellcheck_archive" -C "$shellcheck_root"
          echo "$shellcheck_root/shellcheck-${SHELLCHECK_VERSION}" >> "$GITHUB_PATH"

      - name: Run shellcheck
        shell: bash
        run: bash scripts/check-shell-scripts.sh

  docs-link-check:
    name: Quality / lychee
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lychee
        shell: bash
        run: |
          lychee_root="${RUNNER_TEMP}/lychee"
          mkdir -p "$lychee_root"
          curl -fsSL "https://github.com/lycheeverse/lychee/releases/download/${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" | tar -xzf - -C "$lychee_root"
          echo "$lychee_root" >> "$GITHUB_PATH"

      - name: Run lychee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: bash scripts/check-links.sh

  fmt-check:
    name: Quality / format
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "These files need formatting:"
            echo "$files"
            exit 1
          fi

  vet:
    name: Quality / vet
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

  lint:
    name: Quality / golangci-lint
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: |
          go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          tool_bin="$(go env GOBIN)"
          if [ -z "$tool_bin" ]; then
            tool_bin="$(go env GOPATH | awk -F: '{print $1}')/bin"
          fi
          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Run golangci-lint
        run: golangci-lint run ./...

  mod-tidy-check:
    name: Quality / mod tidy
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod and go.sum are tidy
        shell: bash
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  generated-cli-assets:
    name: Quality / generated CLI assets
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify generated CLI assets
        shell: bash
        run: |
          bash scripts/generate-cli-assets.sh
          git diff --exit-code docs/cli docs/completions docs/man

  unit-tests:
    name: Test / unit
    runs-on: ubuntu-latest
    needs: [workflow-lint, shell-lint, docs-link-check, fmt-check, vet, lint, mod-tidy-check, generated-cli-assets]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: |
          go install "gotest.tools/gotestsum@${GOTESTSUM_VERSION}"
          tool_bin="$(go env GOBIN)"
          if [ -z "$tool_bin" ]; then
            tool_bin="$(go env GOPATH | awk -F: '{print $1}')/bin"
          fi
          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        run: |
          mkdir -p .tmp/test-reports
          gotestsum \
            --format standard-verbose \
            --junitfile .tmp/test-reports/unit.xml \
            -- \
            -count=1 ./...

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-report-unit
          if-no-files-found: ignore
          path: .tmp/test-reports/unit.xml
          retention-days: 7

  race-tests:
    name: Test / race
    runs-on: ubuntu-latest
    needs: [workflow-lint, shell-lint, docs-link-check, fmt-check, vet, lint, mod-tidy-check, generated-cli-assets]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: |
          go install "gotest.tools/gotestsum@${GOTESTSUM_VERSION}"
          tool_bin="$(go env GOBIN)"
          if [ -z "$tool_bin" ]; then
            tool_bin="$(go env GOPATH | awk -F: '{print $1}')/bin"
          fi
          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Run race tests
        run: |
          mkdir -p .tmp/test-reports
          gotestsum \
            --format standard-verbose \
            --junitfile .tmp/test-reports/race.xml \
            -- \
            -race -count=1 ./...

      - name: Upload race test report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-report-race
          if-no-files-found: ignore
          path: .tmp/test-reports/race.xml
          retention-days: 7

  coverage:
    name: Test / coverage
    runs-on: ubuntu-latest
    needs: [workflow-lint, shell-lint, docs-link-check, fmt-check, vet, lint, mod-tidy-check, generated-cli-assets]
    permissions:
      contents: read
      id-token: write
    env:
      STACKCTL_CODECOV_TOKEN_PRESENT: ${{ secrets.CODECOV_TOKEN != '' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Enforce coverage threshold
        env:
          STACKCTL_COVERAGE_THRESHOLD: ${{ env.COVERAGE_THRESHOLD }}
        run: bash scripts/check-coverage.sh

      - name: Upload coverage profile
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-profile
          path: tmp/coverage.out
          retention-days: 7

      - name: Upload coverage to Codecov with token
        if: ${{ env.STACKCTL_CODECOV_TOKEN_PRESENT == 'true' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          disable_search: true
          files: tmp/coverage.out
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Upload coverage to Codecov with OIDC fallback
        if: ${{ env.STACKCTL_CODECOV_TOKEN_PRESENT != 'true' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          disable_search: true
          files: tmp/coverage.out
          fail_ci_if_error: false
          use_legacy_upload_endpoint: true
          use_oidc: true
          verbose: true

      - name: Summarize Codecov auth mode
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ "${STACKCTL_CODECOV_TOKEN_PRESENT}" == "true" ]]; then
            echo "- Codecov upload auth: \`CODECOV_TOKEN\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Coverage gate source of truth: \`scripts/check-coverage.sh\` and \`codecov.yml\` at 100.0%" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Codecov upload auth: OIDC fallback (no \`CODECOV_TOKEN\` configured)" >> "$GITHUB_STEP_SUMMARY"
            echo "- If uploads still fail or the public badge stays unknown, install the Codecov GitHub App and add \`CODECOV_TOKEN\` in repo secrets." >> "$GITHUB_STEP_SUMMARY"
          fi

  integration-tests:
    name: Test / integration
    runs-on: ubuntu-latest
    needs: [workflow-lint, shell-lint, docs-link-check, fmt-check, vet, lint, mod-tidy-check, generated-cli-assets]
    env:
      PODMAN_COMPOSE_PROVIDER: podman-compose
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: |
          go install "gotest.tools/gotestsum@${GOTESTSUM_VERSION}"
          tool_bin="$(go env GOBIN)"
          if [ -z "$tool_bin" ]; then
            tool_bin="$(go env GOPATH | awk -F: '{print $1}')/bin"
          fi
          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Install Podman runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose
          podman --version
          podman compose version

      - name: Warm managed service images
        shell: bash
        run: bash scripts/prepull-managed-images.sh

      - name: Run integration tests
        run: |
          mkdir -p .tmp/test-reports
          gotestsum \
            --format standard-verbose \
            --junitfile .tmp/test-reports/integration.xml \
            -- \
            -tags=integration -count=1 ./integration

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-report-integration
          if-no-files-found: ignore
          path: .tmp/test-reports/integration.xml
          retention-days: 7

  install-script-smoke:
    name: Test / install smoke
    runs-on: ubuntu-latest
    needs: [workflow-lint, shell-lint, docs-link-check, fmt-check, vet, lint, mod-tidy-check, generated-cli-assets]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run installer smoke test
        run: bash scripts/install-smoke.sh

  package-manager-smoke:
    name: Test / package-manager smoke (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [workflow-lint, shell-lint, docs-link-check, fmt-check, vet, lint, mod-tidy-check, generated-cli-assets]
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: debian-bookworm
            image: debian:bookworm
            package_manager: apt
            expect_cockpit: "0"
          - name: ubuntu-24-04
            image: ubuntu:24.04
            package_manager: apt
            expect_cockpit: "0"
          - name: fedora-42
            image: fedora:42
            package_manager: dnf
            expect_cockpit: "1"
          - name: archlinux
            image: archlinux:latest
            package_manager: pacman
            expect_cockpit: "1"
          - name: opensuse-tumbleweed
            image: registry.opensuse.org/opensuse/tumbleweed:latest
            package_manager: zypper
            expect_cockpit: "1"
          - name: alpine-3-21
            image: alpine:3.21
            package_manager: apk
            expect_cockpit: "0"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run package-manager smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/package-manager-smoke
          docker run --rm --pull always \
            -v "$PWD/scripts/package-manager-smoke.sh:/package-manager-smoke.sh:ro" \
            -e STACKCTL_PACKAGE_MANAGER="${{ matrix.package_manager }}" \
            -e STACKCTL_EXPECT_COCKPIT="${{ matrix.expect_cockpit }}" \
            "${{ matrix.image }}" \
            sh /package-manager-smoke.sh | tee ".tmp/package-manager-smoke/${{ matrix.name }}.log"

      - name: Upload package-manager smoke logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: package-manager-smoke-${{ matrix.name }}
          path: .tmp/package-manager-smoke/${{ matrix.name }}.log
          retention-days: 7

  journey-smoke:
    name: Test / journey smoke
    runs-on: ubuntu-latest
    needs: [workflow-lint, shell-lint, docs-link-check, fmt-check, vet, lint, mod-tidy-check, generated-cli-assets]
    env:
      PODMAN_COMPOSE_PROVIDER: podman-compose
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Podman runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose
          podman --version
          podman compose version

      - name: Warm managed service images
        shell: bash
        run: bash scripts/prepull-managed-images.sh

      - name: Run journey smoke
        shell: bash
        run: |
          set -euo pipefail
          STACKCTL_JOURNEY_SMOKE_DIR=.tmp/journey-smoke bash scripts/journey-smoke.sh

      - name: Write journey smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Journey smoke"
            echo
            echo "- Command: \`STACKCTL_JOURNEY_SMOKE_DIR=.tmp/journey-smoke bash scripts/journey-smoke.sh\`"
            echo "- PTY smoke: \`go test ./cmd -run 'TestConfigInitInteractivePTYCustomizesConfig|TestTUIConfigPTYCanCreateAndScaffoldFromScratch|TestTUIOverviewPTYLaunchesWithConfig' -count=1 -v\`"
            echo "- TUI render smoke: \`go test ./internal/tui -run 'TestOverviewExpandedLayoutShowsPathsAndManagedMode|TestViewCanDisableAltScreenForAutomation' -count=1 -v\`"
            echo "- Integration smoke: \`go test ./integration -tags=integration -run 'TestSetupNonInteractiveManagedLifecycleSmoke|TestManagedStackStartFailsFastWhenHostPortBusy|TestExternalStackMetadataSmoke|TestNamedStackSelectionAndPathResolution|TestNamedStackSingleRunningStackGuard' -count=1 -v\`"
            echo "- Logs artifact: \`journey-smoke-logs\`"
            echo
            if [ -f .tmp/journey-smoke/pty.log ]; then
              echo "### PTY smoke tail"
              echo '```text'
              tail -n 40 .tmp/journey-smoke/pty.log
              echo '```'
              echo
            fi
            if [ -f .tmp/journey-smoke/tui-render.log ]; then
              echo "### TUI render smoke tail"
              echo '```text'
              tail -n 40 .tmp/journey-smoke/tui-render.log
              echo '```'
              echo
            fi
            if [ -f .tmp/journey-smoke/integration.log ]; then
              echo "### Integration smoke tail"
              echo '```text'
              tail -n 60 .tmp/journey-smoke/integration.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload journey smoke logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: journey-smoke-logs
          path: .tmp/journey-smoke
          retention-days: 7

  release-dry-run:
    name: Release / snapshot dry-run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs:
      - unit-tests
      - race-tests
      - coverage
      - integration-tests
      - install-script-smoke
      - package-manager-smoke
      - journey-smoke
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install release toolchain
        run: |
          go install "github.com/goreleaser/goreleaser/v2@${GORELEASER_VERSION}"
          go install "github.com/anchore/syft/cmd/syft@${SYFT_VERSION}"
          go install "github.com/sigstore/cosign/v3/cmd/cosign@${COSIGN_VERSION}"
          tool_bin="$(go env GOBIN)"
          if [ -z "$tool_bin" ]; then
            tool_bin="$(go env GOPATH | awk -F: '{print $1}')/bin"
          fi
          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Run GoReleaser snapshot dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          goreleaser release --snapshot --clean

  build:
    name: Build / binary
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - race-tests
      - coverage
      - integration-tests
      - install-script-smoke
      - package-manager-smoke
      - journey-smoke
      - release-dry-run
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist
          go build -trimpath -o dist/stackctl .

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: stackctl-linux-amd64
          path: dist/stackctl
