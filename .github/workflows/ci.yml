name: ci

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gosec:
    name: Security / gosec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: |
          "$(go env GOPATH)/bin/gosec" ./...

  govulncheck:
    name: Security / govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

  gitleaks:
    name: Security / gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@latest

      - name: Run gitleaks
        run: |
          "$(go env GOPATH)/bin/gitleaks" git --no-banner --redact .

  fmt-check:
    name: Quality / format
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "These files need formatting:"
            echo "$files"
            exit 1
          fi

  vet:
    name: Quality / vet
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

  lint:
    name: Quality / golangci-lint
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: |
          "$(go env GOPATH)/bin/golangci-lint" run ./...

  mod-tidy-check:
    name: Quality / mod tidy
    runs-on: ubuntu-latest
    needs: [gosec, govulncheck, gitleaks]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod and go.sum are tidy
        shell: bash
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  unit-tests:
    name: Test / unit
    runs-on: ubuntu-latest
    needs: [fmt-check, vet, lint, mod-tidy-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./... -count=1

  race-tests:
    name: Test / race
    runs-on: ubuntu-latest
    needs: [fmt-check, vet, lint, mod-tidy-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run race tests
        run: go test ./... -race -count=1

  integration-tests:
    name: Test / integration
    runs-on: ubuntu-latest
    needs: [fmt-check, vet, lint, mod-tidy-check]
    env:
      PODMAN_COMPOSE_PROVIDER: podman-compose
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Podman runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose
          podman --version
          podman compose version

      - name: Run integration tests
        run: go test ./integration -tags=integration -count=1

  package-manager-smoke:
    name: Test / package-manager smoke (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [fmt-check, vet, lint, mod-tidy-check]
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: debian-bookworm
            image: debian:bookworm
            package_manager: apt
            expect_cockpit: "0"
          - name: ubuntu-24-04
            image: ubuntu:24.04
            package_manager: apt
            expect_cockpit: "0"
          - name: fedora-42
            image: fedora:42
            package_manager: dnf
            expect_cockpit: "1"
          - name: archlinux
            image: archlinux:latest
            package_manager: pacman
            expect_cockpit: "1"
          - name: opensuse-tumbleweed
            image: registry.opensuse.org/opensuse/tumbleweed:latest
            package_manager: zypper
            expect_cockpit: "1"
          - name: alpine-3-21
            image: alpine:3.21
            package_manager: apk
            expect_cockpit: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run package-manager smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/package-manager-smoke
          docker run --rm --pull always \
            -v "$PWD/scripts/package-manager-smoke.sh:/package-manager-smoke.sh:ro" \
            -e STACKCTL_PACKAGE_MANAGER="${{ matrix.package_manager }}" \
            -e STACKCTL_EXPECT_COCKPIT="${{ matrix.expect_cockpit }}" \
            "${{ matrix.image }}" \
            sh /package-manager-smoke.sh | tee ".tmp/package-manager-smoke/${{ matrix.name }}.log"

      - name: Upload package-manager smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-manager-smoke-${{ matrix.name }}
          path: .tmp/package-manager-smoke/${{ matrix.name }}.log
          retention-days: 7

  journey-smoke:
    name: Test / journey smoke
    runs-on: ubuntu-latest
    needs: [fmt-check, vet, lint, mod-tidy-check]
    env:
      PODMAN_COMPOSE_PROVIDER: podman-compose
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Podman runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose
          podman --version
          podman compose version

      - name: Run journey smoke
        shell: bash
        run: |
          set -euo pipefail
          STACKCTL_JOURNEY_SMOKE_DIR=.tmp/journey-smoke bash scripts/journey-smoke.sh

      - name: Write journey smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Journey smoke"
            echo
            echo "- Command: \`STACKCTL_JOURNEY_SMOKE_DIR=.tmp/journey-smoke bash scripts/journey-smoke.sh\`"
            echo "- PTY smoke: \`go test ./cmd -run 'TestConfigInitInteractivePTYCustomizesConfig|TestTUIConfigPTYCanCreateAndScaffoldFromScratch|TestTUIOverviewPTYLaunchesWithConfig' -count=1 -v\`"
            echo "- TUI render smoke: \`go test ./internal/tui -run 'TestOverviewExpandedLayoutShowsPathsAndManagedMode|TestViewCanDisableAltScreenForAutomation' -count=1 -v\`"
            echo "- Integration smoke: \`go test ./integration -tags=integration -run 'TestSetupNonInteractiveManagedLifecycleSmoke|TestManagedStackStartFailsFastWhenHostPortBusy|TestExternalStackMetadataSmoke|TestNamedStackSelectionAndPathResolution|TestNamedStackSingleRunningStackGuard' -count=1 -v\`"
            echo "- Logs artifact: \`journey-smoke-logs\`"
            echo
            if [ -f .tmp/journey-smoke/pty.log ]; then
              echo "### PTY smoke tail"
              echo '```text'
              tail -n 40 .tmp/journey-smoke/pty.log
              echo '```'
              echo
            fi
            if [ -f .tmp/journey-smoke/tui-render.log ]; then
              echo "### TUI render smoke tail"
              echo '```text'
              tail -n 40 .tmp/journey-smoke/tui-render.log
              echo '```'
              echo
            fi
            if [ -f .tmp/journey-smoke/integration.log ]; then
              echo "### Integration smoke tail"
              echo '```text'
              tail -n 60 .tmp/journey-smoke/integration.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload journey smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: journey-smoke-logs
          path: .tmp/journey-smoke
          retention-days: 7

  build:
    name: Build / binary
    runs-on: ubuntu-latest
    needs: [unit-tests, race-tests, integration-tests, package-manager-smoke, journey-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist
          go build -o dist/stackctl .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: stackctl-linux-amd64
          path: dist/stackctl
