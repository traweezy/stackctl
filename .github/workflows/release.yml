name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    name: Release / verify
    runs-on: ubuntu-latest
    env:
      PODMAN_COMPOSE_PROVIDER: podman-compose
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Podman runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose
          podman --version
          podman compose version

      - name: Install verification tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          go install github.com/zricethezav/gitleaks/v8@latest

      - name: Run gitleaks
        run: |
          "$(go env GOPATH)/bin/gitleaks" git --no-banner --redact .

      - name: Run gosec
        run: |
          "$(go env GOPATH)/bin/gosec" ./...

      - name: Run govulncheck
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Verify formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "These files need formatting:"
            echo "$files"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        run: |
          "$(go env GOPATH)/bin/golangci-lint" run ./...

      - name: Verify go.mod and go.sum are tidy
        shell: bash
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run unit tests
        run: go test ./... -count=1

      - name: Run race tests
        run: go test ./... -race -count=1

      - name: Run integration tests
        run: go test ./integration -tags=integration -count=1

      - name: Build binary
        run: |
          mkdir -p dist
          go build -o dist/stackctl .

  goreleaser:
    name: Release / goreleaser
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@v2.14.3

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "$(go env GOPATH)/bin/goreleaser" release --clean
